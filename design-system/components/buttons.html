<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#060e1e; color:#ddeeff; font-family:'Inter',sans-serif; padding:28px; }
  .group { margin-bottom:28px; }
  .label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.7px; color:#5c7d9c; margin-bottom:12px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn-primary { background:#00d4a8; color:#021912; border:none; border-radius:8px; padding:10px 20px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn-primary.lg { padding:11px 24px; font-size:14px; border-radius:10px; }
  .btn-primary.sm { padding:6px 14px; font-size:12px; border-radius:6px; }
  .btn-ghost { background:none; border:1px solid rgba(100,160,230,.16); color:#9ab4cc; border-radius:8px; padding:10px 16px; font-size:13.5px; font-weight:500; cursor:pointer; font-family:inherit; }
  .btn-danger { background:rgba(255,77,109,.12); border:1px solid rgba(255,77,109,.3); color:#ff4d6d; border-radius:8px; padding:10px 16px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit; }
  .hint-chip { padding:4px 10px; border-radius:20px; border:1px solid rgba(100,160,230,.16); background:#101e32; color:#9ab4cc; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; }
  .hint-chip:hover { background:rgba(0,212,168,.1); border-color:#00d4a8; color:#00d4a8; }
  .range-btn { padding:5px 13px; border-radius:6px; border:1px solid rgba(100,160,230,.1); background:none; color:#5c7d9c; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
  .range-btn.active { background:rgba(0,212,168,.1); border-color:#00d4a8; color:#00d4a8; }
</style>
</head>
<body>
<div class="group">
  <div class="label">Primary Button</div>
  <div class="row">
    <button class="btn-primary sm">Search</button>
    <button class="btn-primary">Search Stock</button>
    <button class="btn-primary lg">Analyze Sentiment</button>
  </div>
</div>
<div class="group">
  <div class="label">Secondary / Ghost</div>
  <div class="row">
    <button class="btn-ghost">Skip for now</button>
    <button class="btn-danger">Dismiss</button>
  </div>
</div>
<div class="group">
  <div class="label">Hint Chips</div>
  <div class="row">
    <button class="hint-chip">AAPL</button>
    <button class="hint-chip">NVDA</button>
    <button class="hint-chip">TSLA</button>
    <button class="hint-chip">AMZN</button>
  </div>
</div>
<div class="group">
  <div class="label">Range Selector</div>
  <div class="row">
    <button class="range-btn active">1W</button>
    <button class="range-btn">1M</button>
    <button class="range-btn">3M</button>
    <button class="range-btn">1Y</button>
  </div>
</div>
</body>
</html>
