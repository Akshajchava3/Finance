<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#060e1e; color:#ddeeff; font-family:'Inter',sans-serif; padding:24px; }
  .hero { background:#0b1628; border:1px solid rgba(100,160,230,.1); border-radius:14px; padding:24px; display:flex; gap:20px; align-items:flex-start; }
  .logo-ph { width:54px; height:54px; border-radius:12px; background:rgba(0,212,168,.1); border:1px solid #00d4a8; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:#00d4a8; flex-shrink:0; }
  .name { font-size:20px; font-weight:800; letter-spacing:-.3px; }
  .sub { font-size:12px; color:#9ab4cc; margin-top:3px; }
  .price { font-size:32px; font-weight:900; letter-spacing:-1px; margin-top:10px; }
  .up { color:#00c896; }
  .down { color:#ff4d6d; }
  .chg { font-size:15px; font-weight:700; margin-top:2px; }
  .ohlc { display:flex; gap:20px; margin-top:12px; flex-wrap:wrap; }
  .ohlc span { font-size:12px; color:#9ab4cc; }
  .ohlc strong { color:#ddeeff; font-weight:600; }
</style>
</head>
<body>
<div class="hero">
  <div class="logo-ph">A</div>
  <div>
    <div class="name">Apple Inc.</div>
    <div class="sub">AAPL · NASDAQ · Technology</div>
    <div class="price">$213.49</div>
    <div class="chg up">▲ 1.84% today</div>
    <div class="ohlc">
      <span>Open <strong>$210.21</strong></span>
      <span>High <strong>$214.30</strong></span>
      <span>Low <strong>$209.88</strong></span>
      <span>Prev Close <strong>$209.68</strong></span>
    </div>
  </div>
</div>
</body>
</html>
