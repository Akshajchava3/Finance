<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#060e1e; color:#ddeeff; font-family:'Inter',sans-serif; padding:24px; }
  .row { display:flex; align-items:baseline; gap:20px; padding:10px 0; border-bottom:1px solid rgba(100,160,230,.08); }
  .row:last-child { border-bottom:none; }
  .meta { width:100px; font-size:11px; color:#5c7d9c; font-family:monospace; flex-shrink:0; }
  .sample { color:#ddeeff; }
  .sp-48 { font-size:48px; font-weight:900; letter-spacing:-2px; line-height:1; }
  .sp-32 { font-size:32px; font-weight:800; letter-spacing:-1px; }
  .sp-24 { font-size:24px; font-weight:800; letter-spacing:-.4px; }
  .sp-20 { font-size:20px; font-weight:700; }
  .sp-16 { font-size:16px; font-weight:600; }
  .sp-14 { font-size:14px; font-weight:500; }
  .sp-13 { font-size:13px; font-weight:400; color:#9ab4cc; }
  .sp-12 { font-size:12px; font-weight:500; color:#9ab4cc; }
  .sp-11 { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.7px; color:#5c7d9c; }
</style>
</head>
<body>
<div class="row"><div class="meta">48 / 900</div><div class="sample sp-48">+4.2</div></div>
<div class="row"><div class="meta">32 / 800</div><div class="sample sp-32">Track stocks.</div></div>
<div class="row"><div class="meta">24 / 800</div><div class="sample sp-24">Stock Search</div></div>
<div class="row"><div class="meta">20 / 700</div><div class="sample sp-20">Apple Inc.</div></div>
<div class="row"><div class="meta">16 / 600</div><div class="sample sp-16">Key Metrics</div></div>
<div class="row"><div class="meta">14 / 500</div><div class="sample sp-14">The company reported strong quarterly earnings…</div></div>
<div class="row"><div class="meta">13 / 400</div><div class="sample sp-13">r/wallstreetbets · ↑ 4.2k · 3h ago</div></div>
<div class="row"><div class="meta">12 / 500</div><div class="sample sp-12">NASDAQ 100 ETF</div></div>
<div class="row"><div class="meta">11 CAPS / 600</div><div class="sample sp-11">P/E Ratio</div></div>
</body>
</html>
